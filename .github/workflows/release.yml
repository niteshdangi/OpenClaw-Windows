name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      WIN_CERTIFICATE: ${{ secrets.WIN_CERTIFICATE }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows Target
        run: rustup target add x86_64-pc-windows-msvc

      # Cache Cargo
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Frontend
      - name: Install Frontend Dependencies
        run: npm ci

      # Decode and Import Code Signing Certificate
      - name: Import Windows Certificate
        if: env.WIN_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certPath = "$pwd/certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERTIFICATE))
          $securePassword = ConvertTo-SecureString -String $env:WIN_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          echo "TAURI_SIGNING_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          echo "TAURI_SIGNING_TIMESTAMP_URL=http://timestamp.digicert.com" >> $env:GITHUB_ENV

      # Build & Release
      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "OpenClaw Windows v__VERSION__"
          releaseBody: "Download the latest Windows companion for OpenClaw."
          releaseDraft: true
          prerelease: false
